{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastro de Usuários</title>
</head>
<body>
    <div class="container">
      <div class="row">
        <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
            <div class="card border-0 shadow rounded-3 my-5">
                <div class="card-body p-4 p-sm-5">
                    <h5 class="card-title text-center mb-5 fw-light fs-5">Cadastro de Usuários</h5>
                     <form action="{% url 'cadastro' %}" method="POST">
                        {% csrf_token %}
                            <div class="alert alert-{{ message.tags }}" role="alert">
                            </div>
                        <div class="form-floating mb-3">
                          <input type="text" class="form-control" id="nomeCompleto" placeholder="Nome completo" name="nome" required>
                          <label for="nomeCompleto">Nome completo</label>
                        </div>
                        <div class="form-floating mb-3">
                          <input type="email" class="form-control" id="email" placeholder="email@exemplo.com" name="email" required>
                          <label for="email">E-mail</label>
                        </div>
                        <div class="form-floating mb-3">
                          <input type="password" class="form-control" id="senha" placeholder="Senha" name="senha" required>
                          <label for="senha">Senha</label>
                        </div>
                        <div class="d-grid">
                          <button class="btn btn-primary btn-login text-uppercase fw-bold" type="submit">Cadastrar</button>
                        </div>
                            <hr class="my-4">
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>    
</body>
</html>
